version: '3.8'

services:
  frontend:
    build: .
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

  backend:
    build: ./server
    ports:
      - "4000:5000"
      - "5005:5005"
    environment:
      - PORT=5000
      - NODE_ENV=development
      - START_RAG=true
      # Si te conectas a Ollama localmente, usa esta variable:
      - OLLAMA_HOST=host.docker.internal
    volumes:
      - ./server:/app
      - /app/node_modules
    restart: always
    depends_on:
      - database

  database:
    image: postgres:15
    environment:
      POSTGRES_USER: usuario
      POSTGRES_PASSWORD: password
      POSTGRES_DB: danhee_db
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

  ngrok_tunnel:
    image: ngrok/ngrok:latest
    container_name: ngrok_tunnel
    restart: always
    command:
      - "http"
      - "frontend:80" 
      - "--domain=unspoken-resurrect-bountiful.ngrok-free.dev" 
    environment:
      NGROK_AUTHTOKEN: "3Gaoq1v9kxSDAO5NNQ8uoyexZC8_2r9Ps6arERFBavWbTQsni" 
    depends_on:
      - frontend

# Volumen definido para la persistencia de datos
volumes:
  db_data: