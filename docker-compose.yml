version: '3.8'

services:
  # Servicio para tu Backend (el de la carpeta /server)
  backend:
    build: ./server
    ports:
      - "5000:5000" # Ajusta el primer número al puerto que quieras usar en tu PC
    environment:
      - PORT=5000
      - NODE_ENV=development
      - START_RAG=false
      # Si te conectas a Ollama localmente, usa esta variable:
      - OLLAMA_HOST=host.docker.internal 
    volumes:
      - ./server:/app
      - /app/node_modules # Evita que Docker sobrescriba los módulos instalados en el contenedor
    restart: always

  # Si tienes un contenedor para base de datos (ej. PostgreSQL)
  # Si usas Supabase o base de datos externa, no necesitas este bloque
  database:
    image: postgres:15
    environment:
      POSTGRES_USER: usuario
      POSTGRES_PASSWORD: password
      POSTGRES_DB: danhee_db
    volumes:
      - db_data:/var/lib/postgresql/data # Persistencia de datos obligatoria según rúbrica
    ports:
      - "5432:5432"

# Volumen definido para la persistencia de datos
volumes:
  db_data: